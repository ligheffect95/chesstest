<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MTA Chess | 620 ELO</title>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root { --duo-green: #58cc02; --mta-dark: #121212; }
        body { 
            background: var(--mta-dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }
        /* CRITICAL: The board needs a width or it stays invisible */
        #board { 
            width: 90vw; 
            max-width: 400px; 
            margin: 0 auto;
        }
        .status { margin-bottom: 20px; color: var(--duo-green); font-weight: bold; text-transform: uppercase; }
        
        /* THEME */
        .black-3c85d { background-color: var(--duo-green) !important; }
        .white-1e1d7 { background-color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="status" id="status">YOUR MOVE</div>
    <div id="board"></div>

    <script>
        // Use a simple init to prove the board works
        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            position: 'start',
            // Pointing to your sliced SVGs
            pieceTheme: 'assets/pieces/{piece}.svg'
        });

        // Basic "Vibe" Resize for mobile
        $(window).resize(board.resize);
    </script>
</body>
</html>
