<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTA Chess</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { background: #121212; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #board { width: 90vw; max-width: 400px; }
        /* DUOLINGO GREEN */
        .black-3c85d { background-color: #58cc02 !important; }
        .white-1e1d7 { background-color: #ffffff !important; }
    </style>
</head>
<body>
    <div id="board"></div>
    <script>
        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            position: 'start'
        });
    </script>
</body>
</html>
