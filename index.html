<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Luke's Chess | Dream Machine Class</title>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root { 
            --dark-square: #121f26; 
            --light-square: #1d353d; 
            --main-bg: #121212;      
            --status-text: #c96f3d;  
        }
        
        body { 
            background: var(--main-bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif;
        }

        #board { width: 92vw; max-width: 450px; min-height: 300px; display: block; margin: 0 auto; }

        .status { margin-bottom: 20px; color: var(--status-text); font-weight: 900; letter-spacing: 1px; text-transform: uppercase;}

        /* BOARD THEME */
        .black-3c85d { background-color: var(--dark-square) !important; }
        .white-1e1d7 { background-color: var(--light-square) !important; }
    </style>
</head>
<body>

    <div class="status" id="status">YOUR MOVE</div>
    <div id="board"></div>

    <script>
        $(document).ready(function() {
            var board = null;
            var game = new Chess();
            var $status = $('#status');
            var selectedSquare = null;

            function makeMove() {
                var moves = game.moves();
                if (moves.length === 0) return;

                var move;
                var captures = game.moves({ verbose: true }).filter(function(m) { return m.captured; });
                
                if (captures.length > 0 && Math.random() > 0.3) {
                    move = captures[Math.floor(Math.random() * captures.length)].san;
                } else {
                    move = moves[Math.floor(Math.random() * moves.length)];
                }

                game.move(move);
                board.position(game.fen());
                
                if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
                updateStatus();
            }

            // TAP TO MOVE LOGIC
            $('#board').on('click', '.square-55d63', function() {
                if (game.game_over() || game.turn() !== 'w') return;

                var square = $(this).attr('data-square');
                var piece = game.get(square);

                // 1. Tapping your own piece selects it
                if (piece && piece.color === 'w') {
                    selectedSquare = square;
                    $('.square-55d63').css('box-shadow', ''); 
                    $(this).css('box-shadow', 'inset 0 0 0 4px var(--status-text)'); 
                    return;
                }

                // 2. Tapping somewhere else to move
                if (selectedSquare) {
                    var move = game.move({
                        from: selectedSquare,
                        to: square,
                        promotion: 'q' 
                    });

                    // If illegal move, just deselect
                    if (move === null) {
                        selectedSquare = null;
                        $('.square-55d63').css('box-shadow', '');
                        return;
                    }

                    // Move was legal
                    board.position(game.fen());
                    selectedSquare = null;
                    $('.square-55d63').css('box-shadow', '');

                    if (navigator.vibrate) navigator.vibrate(40);
                    
                    updateStatus();
                    window.setTimeout(makeMove, 600);
                }
            });

            function updateStatus () {
                var statusStr = 'Your Move';
                if (game.in_checkmate()) statusStr = 'Checkmate! You Win.';
                else if (game.in_draw()) statusStr = 'Draw.';
                else if (game.turn() === 'b') statusStr = 'Thinking...';
                
                $status.html(statusStr);
            }

            var config = {
                draggable: false, // Dragging is permanently disabled
                position: 'start',
                pieceTheme: 'assets/pieces/{piece}.svg' 
            };
            
            board = Chessboard('board', config);
            updateStatus();
            $(window).resize(board.resize);
        });
    </script>
</body>
</html>
