        /* 2. THE DUOLINGO VISUAL SYSTEM */
        :root {
            --duo-green: #58cc02;
            --mta-dark: #121212;
            --text-color: #f0f0f0;
        }

        body { 
            background: var(--mta-dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            touch-action: none; 
        }
        
        #board-container {
            width: 92vw; 
            max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 8px;
            background: white; /* Prevents flickering during load */
        }

        .status-bar { 
            color: var(--duo-green); 
            font-size: 1.25rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
