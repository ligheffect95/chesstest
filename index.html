<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MTA Chess | 620 ELO</title>

    <link rel="stylesheet" href="chessboard.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="chessboard.min.js"></script>
    <script src="chess.min.js"></script>

    <style>
        :root { 
            --mta-dark-grey: #444444; 
            --mta-light-grey: #cccccc; 
            --mta-background: #121212; 
            --status-green: #58cc02; 
        }
        
        body { 
            background: var(--mta-background); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif;
        }

        #board { width: 92vw; max-width: 450px; min-height: 300px; }

        .status { margin-bottom: 20px; color: var(--status-green); font-weight: 900; letter-spacing: 1px; }

        /* MTA GREY THEME */
        .black-3c85d { background-color: var(--mta-dark-grey) !important; }
        .white-1e1d7 { background-color: var(--mta-light-grey) !important; }
    </style>
</head>
<body>

    <div class="status" id="status">YOUR MOVE</div>
    <div id="board"></div>

    <script>
        $(document).ready(function() {
            var board = null;
            var game = new Chess();
            var $status = $('#status');

            // --- THE COMPUTER OPPONENT ---
            function makeMove() {
                var moves = game.moves();
                if (moves.length === 0) return; // Game over

                // 620 ELO Logic: 70% chance to take a free piece if available
                var move;
                var captures = game.moves({ verbose: true }).filter(m => m.captured);
                
                if (captures.length > 0 && Math.random() > 0.3) {
                    move = captures[Math.floor(Math.random() * captures.length)].san;
                } else {
                    move = moves[Math.floor(Math.random() * moves.length)];
                }

                game.move(move);
                board.position(game.fen());
                
                if (navigator.vibrate) navigator.vibrate([20, 50, 20]); // Haptic double-tap
                updateStatus();
            }

            // --- THE REFEREE (Constraints) ---
            function onDragStart (source, piece) {
                // Do not pick up pieces if the game is over
                if (game.game_over()) return false;
                
                // Only pick up White pieces (you are playing White)
                if (piece.search(/^b/) !== -1) return false;
            }

            function onDrop (source, target) {
                // Check if the move is legal
                var move = game.move({
                    from: source,
                    to: target,
                    promotion: 'q' 
                });

                // If illegal move, snap the piece back to where it was
                if (move === null) return 'snapback';

                if (navigator.vibrate) navigator.vibrate(40); // Haptic single-tap
                
                updateStatus();
                
                // Tell the computer to make a move 600ms later
                window.setTimeout(makeMove, 600);
            }

            function updateStatus () {
                var status = 'Your Move';
                if (game.in_checkmate()) status = 'Checkmate! You Win.';
                else if (game.in_draw()) status = 'Draw.';
                else if (game.turn() === 'b') status = 'Thinking...';
                
                $status.html(status.toUpperCase());
            }

            // --- INITIALIZE EVERYTHING ---
            var config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                pieceTheme: 'assets/pieces/{piece}.svg' 
            };
            
            board = Chessboard('board', config);
            updateStatus();
            $(window).resize(board.resize);
        });
    </script>
</body>
</html>
