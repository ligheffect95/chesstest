<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>MTA Chess | 620 ELO</title>

    <link rel="stylesheet" href="chessboard.min.css" onerror="this.href='https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css'">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    
    <script src="chessboard.min.js" onerror="this.src='https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js'"></script>
    <script src="chess.min.js" onerror="this.src='https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js'"></script>

    <style>
        :root { --duo-green: #58cc02; --mta-dark: #121212; }
        body { background: var(--mta-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #board-container { width: 92vw; max-width: 450px; background: #fff; border-radius: 8px; }
        .status-bar { color: var(--duo-green); font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; }
        .black-3c85d { background-color: var(--duo-green) !important; }
        .white-1e1d7 { background-color: #ffffff !important; }
    </style>

    <style>
        :root {
            --duo-green: #58cc02;
            --mta-dark: #121212;
        }

        body { 
            background: var(--mta-dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            touch-action: none; 
        }
        
        #board-container {
            width: 92vw; 
            max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 8px;
        }

        .status-bar { 
            color: var(--duo-green); 
            font-size: 1.25rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* DUOLINGO THEME OVERRIDE */
        .black-3c85d { background-color: var(--duo-green) !important; }
        .white-1e1d7 { background-color: #ffffff !important; }
    </style>
</head>
<body>

    <div class="status-bar" id="status">YOUR MOVE</div>
    <div id="board-container"></div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');

        // THE 620 ELO BRAIN
        function make620EloMove() {
            var moves = game.moves({ verbose: true });
            if (moves.length === 0) return;

            var moveObj;
            var captures = moves.filter(m => m.captured);

            if (captures.length > 0 && Math.random() > 0.3) {
                moveObj = captures[Math.floor(Math.random() * captures.length)];
            } else {
                moveObj = moves[Math.floor(Math.random() * moves.length)];
            }

            game.move(moveObj.san);
            board.position(game.fen());
            
            if (navigator.vibrate) navigator.vibrate([20, 50, 20]);
            updateStatus();
        }

        function onDragStart (source, piece) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            if (navigator.vibrate) navigator.vibrate(40);

            updateStatus();
            window.setTimeout(make620EloMove, 650);
        }

        function updateStatus () {
            var statusStr = game.turn() === 'w' ? 'YOUR MOVE' : 'THINKING...';
            if (game.in_checkmate()) statusStr = 'CHECKMATE';
            $status.html(statusStr);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            // THIS POINTS TO YOUR 12 SLICED SVG FILES
            pieceTheme: 'assets/pieces/{piece}.svg'
        };
        
        board = Chessboard('board-container', config);
        updateStatus();
    </script>
</body>
</html>
