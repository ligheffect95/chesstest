<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>MTA Chess | 620 ELO</title>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

   <style>
    :root { 
        --mta-dark-grey: #444444;  /* Dark squares */
        --mta-light-grey: #cccccc; /* Light squares */
        --mta-background: #121212; /* Deep background */
        --status-green: #58cc02;   /* Keep the Duo green for text */
    }
    
    body { 
        background: var(--mta-background); 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif;
    }

    #board { width: 92vw; max-width: 450px; }

    .status { margin-bottom: 20px; color: var(--status-green); font-weight: 900; letter-spacing: 1px; }

    /* GREY THEME OVERRIDES */
    .black-3c85d { background-color: var(--mta-dark-grey) !important; }
    .white-1e1d7 { background-color: var(--mta-light-grey) !important; }
</style>
</head>
<body>

    <div class="status" id="status">YOUR MOVE</div>
    <div id="board"></div>

    <script>
        // Use a simple init to prove the board works
        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            position: 'start',
            // Pointing to your sliced SVGs
            pieceTheme: 'assets/pieces/{piece}.svg'
        });

        // Basic "Vibe" Resize for mobile
        $(window).resize(board.resize);
    </script>
</body>
</html>
